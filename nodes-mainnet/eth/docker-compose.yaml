

services:
  geth:
    image: ethereum/client-go:v1.16.8@sha256:32d467632557e9bf38ff75ae48cfa6476487d0a1efba3fa7a3cf2f0a938ed8a9
    container_name: ethereum
    command:
      - --mainnet
      - --datadir=/opt/ethereumd/.ethereum
      - --ws
      - --http
      - --http.addr=0.0.0.0
      - --http.vhosts=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.vhosts=*
      - --authrpc.jwtsecret=/opt/ethereumd/.ethereum/jwt.hex
    ports:
      - 8545:8545
      - 30303:30303
    volumes:
      - eth-mainnet-data:/opt/ethereumd/.ethereum
      - ./jwt.hex:/opt/ethereumd/.ethereum/jwt.hex

  beacon:
    image: gcr.io/offchainlabs/prysm/beacon-chain:v7.1.2@sha256:749f8a0f155a807c3540554a13d2f5adacbdbc98dd2a0d787ce00db6e233df27
    container_name: beacon
    command:
      - --mainnet
      - --config-file=/opt/ethereumd/data/beacon.yaml
    ports:
      - 3500:3500
      - 12000:12000
    volumes:
      - eth-mainnet-data:/opt/ethereumd/data
      - ./beacon.yaml:/opt/ethereumd/data/beacon.yaml
      - ./jwt.hex:/opt/ethereumd/data/jwt.hex

volumes:
  eth-mainnet-data:
