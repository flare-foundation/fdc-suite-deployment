

services:
  dogecoin-node:
    image: flarefoundation/dogecoin:1.14.9-dless@sha256:a07f31426f946f2dc0f2f2eb1b293548994c38afc8ed5bf3d10e8101827e3a69
    container_name: node-mainnet-doge
    restart: unless-stopped
    ports:
      - 22555:22555
      - 22556:22556
    volumes:
      - dogecoin-mainnet-data:/opt/dogecoin/.dogecoin/db
      - ./dogecoin.conf:/opt/dogecoin/.dogecoin/dogecoin.conf

volumes:
  dogecoin-mainnet-data:
